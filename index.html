<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un momento para nosotros ✨</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            font-family: 'Georgia', serif;
            color: #4a4a4a;
        }
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1s;
        }
        button {
            padding: 15px 30px;
            font-family: 'Georgia', serif;
            font-size: 1.2rem;
            background: white;
            border: 1px solid #cfdef3;
            color: #4a4a4a;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.3s;
        }
        button:hover { background: #f0f4ff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container {
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            opacity: 0;
            transition: opacity 2s;
        }
        #musicPlayer { margin-top: 30px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="iniciar()">Para ti ✨</button>
    </div>

    <div class="container" id="mainContent">
        <h1>Hola, tú...</h1>
        <p>Me di cuenta de que nunca te hice esta pregunta, pero hoy quiero hacerlo formalmente.</p>
        <p style="font-size: 1.4rem;"><b>¿Quieres ser mi novia?</b></p>
        
        <div id="musicPlayer"></div>

        <p style="font-style: italic; margin-top: 30px; opacity: 0.7;">"You make everything look like opalite..."</p>
    </div>

    <script>
        function iniciar() {
            // Ocultar el botón
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 1000);
            
            // Mostrar contenido
            document.getElementById('mainContent').style.opacity = '1';

            // Insertar el reproductor
            document.getElementById('musicPlayer').innerHTML = `
                <iframe allow="autoplay *; encrypted-media *;" frameborder="0" height="150" 
                style="width:100%;max-width:660px;overflow:hidden;background:transparent;" 
                src="<iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="175" style="width:100%;max-width:660px;overflow:hidden;border-radius:10px;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" src="https://embed.music.apple.com/mx/song/opalite/1838810953?l=en-GB"></iframe>"></iframe>`;
        }
    </script>
</body>
</html>
