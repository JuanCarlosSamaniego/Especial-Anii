<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Anii ❤️</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Degradado en tonos Rosa Palo / Dusty Rose */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebcdcd 100%);
            font-family: 'Georgia', serif;
            color: #4a4a4a;
            overflow: hidden;
        }
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 1.5s ease;
        }
        .start-btn {
            padding: 15px 40px;
            font-family: 'Georgia', serif;
            font-size: 1rem;
            background: white;
            border: 1px solid #ebcdcd; /* Borde rosa suave */
            color: #a3a3a3;
            cursor: pointer;
            border-radius: 50px;
            letter-spacing: 2px;
            transition: all 0.5s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .start-btn:hover {
            letter-spacing: 3px;
            color: #4a4a4a;
            background: #fffcfc;
        }
        .container {
            text-align: center;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            opacity: 0;
            transition: opacity 2.5s ease;
            background: rgba(255, 255, 255, 0.3); /* Fondo sutil para el texto */
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        h1 { font-weight: normal; font-size: 1.8rem; margin-bottom: 20px; color: #333; }
        
        .mensaje-completo { 
            font-size: 1.3rem; 
            line-height: 1.6; 
            margin: 25px 0; 
            color: #333;
            font-style: italic;
        }
        
        #musicPlayer {
            margin-top: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .footer { margin-top: 40px; font-size: 0.75rem; font-style: italic; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="reveal()">ABRIR CON AMOR ✨</button>
    </div>

    <div class="container" id="mainContent">
        <h1>Hola Anii ❤️</h1>
        
        <div class="mensaje-completo">
            Gracias por ser parte de mi historia.
            <br><br>
            ¿Me dejas ser el protagonista de la tuya como tu novio?
        </div>
        
        <div id="musicPlayer">
            <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" 
                frameborder="0" height="175" 
                style="width:100%;max-width:660px;overflow:hidden;border-radius:10px;" 
                sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" 
                src="https://embed.music.apple.com/mx/song/opalite/1838810953?l=en-GB&autoplay=1">
            </iframe>
        </div>

        <div class="footer">"You make everything look like opalite..."</div>
    </div>

    <script>
        function reveal() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('mainContent').style.opacity = '1';
            }, 1500);
        }
    </script>
</body>
</html>
