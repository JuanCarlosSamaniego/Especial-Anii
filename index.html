<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #e0eafc, #cfdef3); /* Colores tipo Opalite */
            font-family: 'Georgia', serif;
            color: #4a4a4a;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.6);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 80%;
        }
        h1 { font-size: 1.8rem; margin-bottom: 20px; font-weight: normal; }
        p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .qr-section img {
            width: 150px;
            height: 150px;
            border: 5px solid white;
            border-radius: 10px;
        }
        .footer { margin-top: 20px; font-size: 0.9rem; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hola, tú...</h1>
        <p>
            Me di cuenta de que, aunque ya somos todo el uno para el otro, 
            nunca te hice esta pregunta de la forma en que te lo mereces. 
            <br><br>
            <b>¿Quieres ser mi novia oficialmente?</b>
        </p>
        
        <div class="qr-section">
            <p style="font-size: 0.8rem;">Escanea esto para escuchar nuestra canción:</p>
            <img src="qr.png" alt="QR Apple Music">
        </div>

        <div class="footer">
            "You make everything look like opalite..."
        </div>
    </div>
</body>
</html>
